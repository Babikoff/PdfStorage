services:
  postgres:
    image: postgres:17-alpine
    container_name: documentstorage-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  documentstorage-web-api:
    image: documentstorage-web-api:latest
    container_name: documentstorage-web-api
    build:
      context: .
      dockerfile: DocumentStorageWebApi/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__PostgresConnection=Host=postgres;Port=5432;Database=documentsStorage;Username=postgres;Password=123
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: