services:
  postgres:
    image: postgres:17-alpine
    container_name: documentstorage-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  rabbitmq:
    image: rabbitmq:management
    container_name: documentstorage-rabbitmq
    ports:
      - "5672:5672"       # RabbitMQ messaging port
      - "15672:15672"     # RabbitMQ Management Plugin port
    environment:
      - RABBITMQ_DEFAULT_USER=rabbitmq
      - RABBITMQ_DEFAULT_PASS=rabbitmq
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M       # Limit RabbitMQ to 512 MB of RAM

  documentstorage-web-api:
    image: documentstorage-web-api:latest
    container_name: documentstorage-web-api
    build:
      context: .
      dockerfile: DocumentStorageWebApi/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__PostgresConnection=Host=postgres;Port=5432;Database=documentsStorage;Username=postgres;Password=123
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__UserName=rabbitmq
      - RabbitMQ__Password=rabbitmq
      - RabbitMQ__QueueName=document-files-queue
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  background-file-processor:
    image: background-file-processor:latest
    container_name: background-file-processor
    build:
      context: .
      dockerfile: BackgroundFileProcessor/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__PostgresConnection=Host=postgres;Port=5432;Database=documentsStorage;Username=postgres;Password=123
      - RabbitMQ__HostName=rabbitmq
      - RabbitMQ__Port=5672
      - RabbitMQ__UserName=rabbitmq
      - RabbitMQ__Password=rabbitmq
      - RabbitMQ__QueueName=document-files-queue
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started

volumes:
  postgres_data: